<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SabiLearn Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f8faf8",
                        "surface-tint": "#1b6d24",
                        "surface-container-high": "#e6e9e7",
                        "on-tertiary-fixed-variant": "#004786",
                        "outline": "#707a6c",
                        "on-secondary-fixed-variant": "#693c00",
                        "on-tertiary-container": "#ebf1ff",
                        "inverse-surface": "#2e3130",
                        "tertiary-fixed": "#d4e3ff",
                        "surface-variant": "#e1e3e1",
                        "outline-variant": "#bfcaba",
                        "on-surface-variant": "#40493d",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdcbe",
                        "primary": "#0d631b",
                        "error": "#ba1a1a",
                        "surface-dim": "#d8dad9",
                        "secondary-fixed-dim": "#ffb870",
                        "on-secondary-fixed": "#2c1600",
                        "inverse-on-surface": "#eff1ef",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#006eca",
                        "surface-container-low": "#f2f4f2",
                        "tertiary": "#00569f",
                        "on-background": "#191c1b",
                        "primary-fixed": "#a3f69c",
                        "on-primary-container": "#cbffc2",
                        "on-secondary": "#ffffff",
                        "surface-container": "#eceeec",
                        "secondary": "#8b5000",
                        "tertiary-fixed-dim": "#a5c8ff",
                        "background": "#f8faf8",
                        "error-container": "#ffdad6",
                        "primary-container": "#2e7d32",
                        "surface": "#f8faf8",
                        "on-surface": "#191c1b",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e1",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#001c3a",
                        "inverse-primary": "#88d982",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#ff9800",
                        "on-primary-fixed": "#002204",
                        "primary-fixed-dim": "#88d982",
                        "on-secondary-container": "#653900",
                        "on-primary-fixed-variant": "#005312"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(248, 250, 248, 0.8);
            backdrop-filter: blur(12px);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #0d631b 0%, #2e7d32 100%);
        }
        .ambient-shadow {
            box-shadow: 0 12px 32px -4px rgba(27, 109, 36, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Suppressed TopAppBar and BottomNavBar as this is a linear/transactional screen -->
<main class="w-full max-w-md relative">
<!-- Background decorative elements to break the template look and add "Digital Sanctuary" feel -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary-fixed opacity-20 rounded-full blur-3xl z-0 pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-80 h-80 bg-tertiary-fixed opacity-20 rounded-full blur-3xl z-0 pointer-events-none"></div>
<div class="relative z-10 bg-surface-container-lowest rounded-lg p-8 sm:p-12 ambient-shadow">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary-container mb-6 shadow-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline text-3xl font-bold text-on-surface mb-2 tracking-tight">Welcome Back</h1>
<p class="font-body text-base text-on-surface-variant leading-relaxed">Sign in to continue your journey with Fluid Scholar.</p>
</div>
<form class="space-y-6">
<!-- Input: Email/Phone -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="identifier">Email or Phone</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-highest border border-outline-variant/30 rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors duration-200 text-on-surface placeholder-on-surface-variant/70 font-body text-base" id="identifier" name="identifier" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label text-sm font-medium text-on-surface" for="password">Password</label>
<a class="font-label text-sm font-medium text-tertiary hover:text-on-tertiary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-11 py-3.5 bg-surface-container-highest border border-outline-variant/30 rounded focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors duration-200 text-on-surface placeholder-on-surface-variant/70 font-body text-base" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-base font-label font-semibold text-on-primary signature-gradient hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-label text-sm">or</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="w-full flex justify-center py-3.5 px-4 border border-outline-variant/30 rounded bg-surface-container-lowest hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="button">
<span class="font-label text-base font-medium text-on-surface">Create an Account</span>
</button>
<button class="w-full flex justify-center items-center py-3.5 px-4 border-none rounded bg-transparent hover:bg-surface-container focus:outline-none transition-colors duration-200 text-primary" type="button">
<span class="material-symbols-outlined mr-2 text-lg">offline_bolt</span>
<span class="font-label text-base font-medium">Continue Offline</span>
</button>
</div>
</div>
</form>
</div>
<!-- subtle footer text to anchor the composition -->
<p class="text-center text-sm text-on-surface-variant mt-8 font-label">
            By signing in, you agree to our <a class="text-tertiary hover:underline" href="#">Terms of Service</a> and <a class="text-tertiary hover:underline" href="#">Privacy Policy</a>.
        </p>
</main>
</body></html>
