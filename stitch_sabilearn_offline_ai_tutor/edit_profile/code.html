<html class="light" lang="en"><head>

                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]

        }

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen antialiased flex flex-col items-center">
<header class="bg-surface/80 dark:bg-surface-dark/80 backdrop-blur-xl fixed top-0 w-full z-50 no-border tonal-shift bg-surface-container-low flat no-shadows flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-green-800 dark:text-green-400 hover:bg-green-50/50 dark:hover:bg-green-900/20 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-plus-jakarta text-display-md leading-relaxed text-xl font-bold tracking-tight text-green-900 dark:text-green-50">Fluid Scholar</span>
</div>
<div>
<img alt="User profile avatar" class="w-10 h-10 rounded-full object-cover" data-alt="Close up portrait of a young student with a warm smile, softly lit" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAswi3BXbX4X5YjzR73YG9GDcIFLxo2LfnUy__78p4WKF8oPjun_AWBvI5MIZdaoyqPcc2yOydcqMPbdlQZMPIo9fzwr5OvXG17avwVSP5xhmYcs8DQtfvNDtAJXf4hvNOZTROifG2uESTRralMaCLMh2bUSeAnNgDtOSNKI_2U9jCxMTupS1gzrIFN5gI4hk1iLufO_QheCS_pi9fXqF0Z1Yy-QWX8nHNkRdAuHr2woROWFGc8ZNPzubiOJ0IgskYfAcvWtaf1tkkM"/>
</div>
</header>
<main class="w-full max-w-2xl mt-24 px-6 pb-32">
<div class="mb-8">
<h1 class="text-3xl font-headline font-bold text-primary">Edit Profile</h1>
<p class="text-on-surface-variant font-body mt-2">Update your learning preferences and personal details.</p>
</div>
<div class="bg-surface-container-low rounded-lg p-8 mb-8 flex flex-col items-center justify-center text-center">
<div class="relative mb-4">
<img alt="Current Avatar" class="w-32 h-32 rounded-full object-cover border-4 border-surface" data-alt="Close up portrait of a young student with a warm smile, softly lit" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA816u6Lpz7QtFEJ91h2rte6vzD3-qsx2fIIUMSGgZy8Vwy_YdhIL38bgADaEGXWDOJDDk7PF5UXGnDVkZz9f5-iLTg8sgGyPcJcQ6VZYsmem7Ija-jCJDWgmNNVL773Ux-JMuZ1eQzAvYKcKfLtwa1NSQhQGusP2HJC8hqEO2lJ2l9pszE_kIfjeM2lQ65HjkdyrFxKOdBddCOJanvcpOwPvoNSHdDg0H_TVQxrEB55L9n08M7NvQzeLuS_jvrMzS-5_Z5pm9xbHMU"/>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center hover:bg-primary-container transition-colors shadow-[0_12px_32px_-4px_rgba(27,109,36,0.08)]">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</button>
</div>
<h2 class="font-headline font-semibold text-lg">Change Avatar</h2>
<p class="text-sm text-on-surface-variant mt-1">Upload a new picture</p>
</div>
<form class="space-y-8">
<div class="space-y-6">
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-2" for="name">Full Name</label>
<input class="w-full bg-surface-container-highest border outline-variant/15 text-on-surface rounded-DEFAULT px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="name" name="name" placeholder="Enter your name" type="text" value="Alex Rivera"/>
</div>
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-2" for="grade">Grade Level</label>
<select class="w-full bg-surface-container-highest border outline-variant/15 text-on-surface rounded-DEFAULT px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all appearance-none" id="grade" name="grade">
<option>High School - Junior</option>
<option>High School - Senior</option>
<option>College - Freshman</option>
<option>College - Sophomore</option>
</select>
</div>
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-2">Subjects of Interest</label>
<div class="flex flex-wrap gap-3 mt-3">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" type="checkbox"/>
<span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-surface-container border outline-variant/15 text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">Mathematics</span>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" type="checkbox"/>
<span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-surface-container border outline-variant/15 text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">Physics</span>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" type="checkbox"/>
<span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-surface-container border outline-variant/15 text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">Literature</span>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" type="checkbox"/>
<span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-surface-container border outline-variant/15 text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">Computer Science</span>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" type="checkbox"/>
<span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-surface-container border outline-variant/15 text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">Biology</span>
</label>
</div>
</div>
</div>
<div class="pt-6 flex justify-end">
<button class="bg-primary text-on-primary font-label font-medium rounded-full px-8 py-4 w-full md:w-auto hover:bg-primary-container transition-colors shadow-[0_12px_32px_-4px_rgba(27,109,36,0.08)]" type="button">
                    Save Changes
                </button>
</div>
</form>
</main>
</body></html>
