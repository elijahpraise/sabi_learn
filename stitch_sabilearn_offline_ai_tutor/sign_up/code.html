<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SabiLearn - Create Account</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f8faf8",
                        "surface-tint": "#1b6d24",
                        "surface-container-high": "#e6e9e7",
                        "on-tertiary-fixed-variant": "#004786",
                        "outline": "#707a6c",
                        "on-secondary-fixed-variant": "#693c00",
                        "on-tertiary-container": "#ebf1ff",
                        "inverse-surface": "#2e3130",
                        "tertiary-fixed": "#d4e3ff",
                        "surface-variant": "#e1e3e1",
                        "outline-variant": "#bfcaba",
                        "on-surface-variant": "#40493d",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdcbe",
                        "primary": "#0d631b",
                        "error": "#ba1a1a",
                        "surface-dim": "#d8dad9",
                        "secondary-fixed-dim": "#ffb870",
                        "on-secondary-fixed": "#2c1600",
                        "inverse-on-surface": "#eff1ef",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#006eca",
                        "surface-container-low": "#f2f4f2",
                        "tertiary": "#00569f",
                        "on-background": "#191c1b",
                        "primary-fixed": "#a3f69c",
                        "on-primary-container": "#cbffc2",
                        "on-secondary": "#ffffff",
                        "surface-container": "#eceeec",
                        "secondary": "#8b5000",
                        "tertiary-fixed-dim": "#a5c8ff",
                        "background": "#f8faf8",
                        "error-container": "#ffdad6",
                        "primary-container": "#2e7d32",
                        "surface": "#f8faf8",
                        "on-surface": "#191c1b",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e1",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#001c3a",
                        "inverse-primary": "#88d982",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#ff9800",
                        "on-primary-fixed": "#002204",
                        "primary-fixed-dim": "#88d982",
                        "on-secondary-container": "#653900",
                        "on-primary-fixed-variant": "#005312"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen relative overflow-hidden flex items-center justify-center p-6">
<!-- Ambient Background Orbs for Digital Sanctuary Feel -->
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary-fixed-dim/20 blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[50vw] h-[50vw] rounded-full bg-tertiary-fixed-dim/20 blur-3xl pointer-events-none"></div>
<!-- Main Signup Card Container -->
<main class="w-full max-w-lg bg-surface-container-lowest rounded-lg p-8 sm:p-12 relative z-10 shadow-[0_12px_32px_-4px_rgba(27,109,36,0.08)] flex flex-col gap-8">
<!-- Header / Brand -->
<header class="flex flex-col gap-2">
<div class="flex items-center gap-2 mb-2 text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-headline font-bold text-xl tracking-tight">Fluid Scholar</span>
</div>
<h1 class="font-headline text-4xl font-bold text-on-surface">Start learning.</h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed">Join our digital sanctuary and explore without limits.</p>
</header>
<!-- Form Elements -->
<form class="flex flex-col gap-6">
<!-- Full Name Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-medium text-on-surface" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-highest text-on-surface font-body text-base rounded p-4 border-none outline outline-2 outline-outline-variant/15 focus:outline-primary transition-all duration-300 placeholder:text-outline/50" id="fullName" placeholder="e.g. Jane Doe" type="text"/>
</div>
<!-- School Level Selection (Chips) -->
<div class="flex flex-col gap-3">
<label class="font-label text-sm font-medium text-on-surface">School Level</label>
<div class="flex flex-wrap gap-3">
<!-- Inactive Chip -->
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface font-label text-sm font-medium hover:bg-surface-container-high transition-colors" type="button">
                        Middle School
                    </button>
<!-- Active Chip -->
<button class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-label text-sm font-medium shadow-[0_4px_12px_0_rgba(27,109,36,0.15)] transition-colors" type="button">
                        High School
                    </button>
<!-- Inactive Chip -->
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface font-label text-sm font-medium hover:bg-surface-container-high transition-colors" type="button">
                        Undergraduate
                    </button>
<!-- Inactive Chip -->
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface font-label text-sm font-medium hover:bg-surface-container-high transition-colors" type="button">
                        Postgraduate
                    </button>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-medium text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest text-on-surface font-body text-base rounded p-4 pr-12 border-none outline outline-2 outline-outline-variant/15 focus:outline-primary transition-all duration-300 placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full mt-4 py-4 px-6 bg-primary text-on-primary rounded-full font-label text-base font-bold shadow-[0_8px_24px_-4px_rgba(27,109,36,0.2)] hover:bg-primary-container active:scale-95 transition-all duration-200 flex justify-center items-center gap-2" type="button">
                Create Account
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer / Sign In Link -->
<footer class="mt-2 text-center">
<p class="font-body text-base text-on-surface-variant">
                Already have an account? 
                <a class="text-tertiary font-semibold hover:text-tertiary-container transition-colors ml-1" href="#">Sign in</a>
</p>
</footer>
</main>
</body></html>
