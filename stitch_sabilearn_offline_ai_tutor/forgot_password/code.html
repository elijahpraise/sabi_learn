<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SabiLearn - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#f8faf8",
                    "surface-tint": "#1b6d24",
                    "surface-container-high": "#e6e9e7",
                    "on-tertiary-fixed-variant": "#004786",
                    "outline": "#707a6c",
                    "on-secondary-fixed-variant": "#693c00",
                    "on-tertiary-container": "#ebf1ff",
                    "inverse-surface": "#2e3130",
                    "tertiary-fixed": "#d4e3ff",
                    "surface-variant": "#e1e3e1",
                    "outline-variant": "#bfcaba",
                    "on-surface-variant": "#40493d",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#ffdcbe",
                    "primary": "#0d631b",
                    "error": "#ba1a1a",
                    "surface-dim": "#d8dad9",
                    "secondary-fixed-dim": "#ffb870",
                    "on-secondary-fixed": "#2c1600",
                    "inverse-on-surface": "#eff1ef",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#006eca",
                    "surface-container-low": "#f2f4f2",
                    "tertiary": "#00569f",
                    "on-background": "#191c1b",
                    "primary-fixed": "#a3f69c",
                    "on-primary-container": "#cbffc2",
                    "on-secondary": "#ffffff",
                    "surface-container": "#eceeec",
                    "secondary": "#8b5000",
                    "tertiary-fixed-dim": "#a5c8ff",
                    "background": "#f8faf8",
                    "error-container": "#ffdad6",
                    "primary-container": "#2e7d32",
                    "surface": "#f8faf8",
                    "on-surface": "#191c1b",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e1e3e1",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#001c3a",
                    "inverse-primary": "#88d982",
                    "on-tertiary": "#ffffff",
                    "secondary-container": "#ff9800",
                    "on-primary-fixed": "#002204",
                    "primary-fixed-dim": "#88d982",
                    "on-secondary-container": "#653900",
                    "on-primary-fixed-variant": "#005312"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Inter"
                    ]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(248, 250, 248, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-surface text-on-surface">
<!-- Decorative Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary-fixed opacity-20 blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] rounded-full bg-tertiary-fixed opacity-20 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-md relative z-10 flex flex-col">
<!-- Top App Bar equivalent for transactional screen -->
<div class="flex items-center mb-12">
<a class="flex items-center text-primary hover:text-primary-container transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined mr-2 group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
<span class="font-body font-medium text-body-lg">Back to login</span>
</a>
</div>
<!-- Form Card Container -->
<div class="bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_12px_32px_-4px_rgba(27,109,36,0.08)]">
<!-- Header Section -->
<div class="mb-8 text-center md:text-left">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-low mb-6">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline text-headline-md font-bold text-on-surface mb-3 tracking-tight">Forgot Password</h1>
<p class="font-body text-body-lg text-on-surface-variant leading-relaxed">
                    Don't worry, it happens to the best of us. Enter your email or phone number below and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form Section -->
<form action="#" class="space-y-6" method="POST">
<!-- Input Group -->
<div class="space-y-2">
<label class="block font-label text-label-md font-medium text-on-surface-variant" for="recovery-contact">Email or Phone Number</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-0 rounded ring-1 ring-inset ring-outline-variant/15 focus:ring-2 focus:ring-inset focus:ring-primary text-on-surface transition-all duration-200 placeholder:text-outline" id="recovery-contact" name="recovery-contact" placeholder="student@example.com" required="" type="text"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full flex justify-center items-center py-4 px-6 border border-transparent rounded-full text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-[0_12px_32px_-4px_rgba(27,109,36,0.08)] transition-all duration-300 font-headline font-semibold text-lg hover:scale-[1.02] active:scale-95" type="submit">
                        Send Reset Link
                        <span class="material-symbols-outlined ml-2 text-xl" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</form>
<!-- Supportive Footer -->
<div class="mt-8 text-center border-t border-surface-container-high pt-6 hidden">
<!-- Divider prohibited, replaced with empty space visually, though border kept for subtle separation if needed by structural logic, adhering to 'No-Line' rule ideally, so let's remove the border and use space -->
</div>
<div class="mt-8 text-center pt-6">
<p class="font-body text-sm text-on-surface-variant">
                    Having trouble? <a class="font-medium text-tertiary hover:text-tertiary-container underline underline-offset-4 transition-colors" href="#">Contact Support</a>
</p>
</div>
</div>
</main>
</body></html>
